services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - n8n-internal

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${N8N_UID:-1000}:${N8N_GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Berlin}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      N8N_HOST: ${N8N_HOST:?set in .env}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${WEBHOOK_URL:?set in .env}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:?set in .env}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set in .env}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:?set in .env}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?set in .env}
      N8N_PUBLIC_API_DISABLED: ${N8N_PUBLIC_API_DISABLED:-false}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      EXECUTIONS_MODE: ${EXECUTIONS_MODE:-regular}
      EXECUTIONS_DATA_PRUNE: ${EXECUTIONS_DATA_PRUNE:-true}
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-336}
      EXECUTIONS_TIMEOUT: ${EXECUTIONS_TIMEOUT:-3600}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://host.docker.internal:3001}
      OPENCLAW_WEBHOOK_SECRET: ${OPENCLAW_WEBHOOK_SECRET:?set in .env}
      OPENCLAW_TASK_ENDPOINT: ${OPENCLAW_TASK_ENDPOINT:-/api/tasks}
      OPENCLAW_KANBAN_ENDPOINT: ${OPENCLAW_KANBAN_ENDPOINT:-/api/kanban/tasks}
      OPENCLAW_DEFAULT_BOARD_ID: ${OPENCLAW_DEFAULT_BOARD_ID:-995cdcf8-3eda-4bb8-8ce2-c85a10791d95}
      OPENCLAW_DEFAULT_PROJECT_ID: ${OPENCLAW_DEFAULT_PROJECT_ID:-rook-workspace}
      OPENCLAW_DEFAULT_RELATED_REPO: ${OPENCLAW_DEFAULT_RELATED_REPO:-MarcusGraetsch/idp-customer-onboarding}
      OPENCLAW_DEFAULT_TARGET_STATUS: ${OPENCLAW_DEFAULT_TARGET_STATUS:-intake}
      TELEGRAM_AUTOMATION_BOT_TOKEN: ${TELEGRAM_AUTOMATION_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:-549758481}
      TELEGRAM_DIGEST_CHAT_ID: ${TELEGRAM_DIGEST_CHAT_ID:-549758481}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    volumes:
      - ./.n8n:/home/node/.n8n
      - ./workflows:/workflows
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5678/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - n8n-internal

networks:
  n8n-internal:
    driver: bridge
