version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idp_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/idp_platform?sslmode=disable
      AUTH__MODE: dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_KEYCLOAK_URL: http://k8portal.working-notes.org:30081
      NEXT_PUBLIC_KEYCLOAK_REALM: idp-platform
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: idp-portal
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
